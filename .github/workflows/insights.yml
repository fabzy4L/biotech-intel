name: biotech-intel-insights
on:
  # Fires automatically after pipeline.yml succeeds, or trigger manually below.
  # Pipeline cron is disabled, so this only runs when pipeline is manually triggered.
  workflow_run:
    workflows: ["biotech-intel-pipeline"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run rule-based summary
        run: python -m src.insights_rules

      - name: Run LLM summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m src.insights_llm

      - name: Build HTML report
        run: python src/build_report.py

      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf

      - name: Make PDF
        run: wkhtmltopdf docs/daily_brief.html docs/daily_brief.pdf

      - name: Commit report
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: "report: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          add: |
            docs/daily_brief.html
            docs/daily_brief.pdf
            docs/summary.md
            docs/summary_llm.md
